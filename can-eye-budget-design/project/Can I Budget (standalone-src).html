<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Can I Budget — Prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="ext-resource-dependency" content="assets/logo.png" data-resource-id="logo" />
<link rel="icon" href="assets/logo.png"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="app.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<template id="__bundler_thumbnail" data-bg-color="#1E8F85">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#1E8F85"/>
  <g transform="translate(600 400)" text-anchor="middle" font-family="Lato, sans-serif" font-weight="900">
    <text y="-40" font-size="160" fill="#F8C93A" stroke="#111" stroke-width="8" paint-order="stroke">CAN I</text>
    <text y="120" font-size="160" fill="#F8C93A" stroke="#111" stroke-width="8" paint-order="stroke">BUDGET</text>
  </g>
</svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/txn-modal.jsx"></script>
<script type="text/babel" src="components/shells-standalone.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "buffer",
  "paydayDays": 5
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('cib_tweaks') || 'null');
      return saved || TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOn, setTweaksOn] = useState(false);
  const [route, setRoute] = useState('home');
  const [mobileRoute, setMobileRoute] = useState('home');
  const [modalTx, setModalTx] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);

  // Host integration for the Tweaks toggle
  useEffect(() => {
    const handler = (e) => {
      if (!e?.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    localStorage.setItem('cib_tweaks', JSON.stringify(next));
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
  };

  const openTx = (t) => { setModalTx(t); setModalOpen(true); };
  const closeTx = () => setModalOpen(false);

  return (
    <div className="canvas">
      <div className="canvas-head">
        <div>
          <div className="label" style={{font:'900 12px/1 var(--font-display)', letterSpacing:'0.12em'}}>Can I Budget · Prototype</div>
          <h1>Three numbers. One question.</h1>
          <p>Mobile (primary) and desktop mirror, with shared hero, calendar, and edit-transaction modal. Toggle <b>Tweaks</b> in the toolbar to try hero variants and payday countdown.</p>
        </div>
        <div style={{display:'flex', gap:10, alignItems:'center'}}>
          <div style={{display:'inline-flex', background:'#fff', border:'2px solid #111', borderRadius: 999, padding: 4, boxShadow:'3px 3px 0 0 #111'}}>
            {['home','calendar'].map(r => (
              <button key={r}
                onClick={() => { setRoute(r); setMobileRoute(r); }}
                style={{
                  appearance:'none', border:0, background: route===r?'#111':'transparent', color: route===r?'#fff':'#111',
                  padding:'8px 14px', borderRadius:999, font:'700 13px/1 var(--font-sans)', cursor:'pointer',
                  textTransform:'capitalize'
                }}
              >{r === 'home' ? 'Dashboard' : 'Calendar'}</button>
            ))}
            <button
              onClick={() => setModalOpen(true)}
              style={{
                appearance:'none', border:0, background: 'var(--cib-yellow-400)', color:'#111',
                padding:'8px 14px', borderRadius:999, font:'700 13px/1 var(--font-sans)', cursor:'pointer',
                marginLeft: 4,
              }}
            >Open modal</button>
          </div>
        </div>
      </div>

      <div className="stage">
        <div className="phone-col">
          <div style={{position:'relative'}}>
            <IOSDevice width={390} height={800} dark={false}>
              <MobileShell
                variant={tweaks.heroVariant}
                paydayDays={tweaks.paydayDays}
                route={mobileRoute}
                setRoute={setMobileRoute}
                onOpenTx={openTx}
              />
              {modalOpen && (
                <TxnModal initial={modalTx} onClose={closeTx} onSave={closeTx}/>
              )}
            </IOSDevice>
          </div>
          <div style={{font:'700 11px/1 var(--font-sans)', color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.1em'}}>
            Mobile · iPhone
          </div>
        </div>

        <div className="desk-col">
          <div className="macwin">
            <div className="macwin-bar">
              <div className="dots"><span className="r"/><span className="y"/><span className="g"/></div>
              <div className="url">can-eye-budget.app · {route === 'home' ? '/dashboard' : '/calendar'}</div>
              <div style={{width: 48}}/>
            </div>
            <DesktopShell
              variant={tweaks.heroVariant}
              paydayDays={tweaks.paydayDays}
              route={route}
              setRoute={setRoute}
              onOpenTx={openTx}
            />
          </div>
          <div style={{font:'700 11px/1 var(--font-sans)', color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.1em', paddingLeft: 6}}>
            Desktop · Web app
          </div>
        </div>
      </div>

      {tweaksOn && (
        <div className="tweaks">
          <h4>Tweaks</h4>
          <div className="tg">
            <div className="tlabel">Hero variant</div>
            <div className="seg">
              {[['verdict','Verdict'],['numbers','Numbers'],['buffer','Buffer']].map(([k,l]) => (
                <button key={k} className={tweaks.heroVariant===k?'active':''} onClick={() => setTweak('heroVariant', k)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="tg">
            <div className="tlabel">Days to payday</div>
            <div className="seg">
              {[0, 5, 14].map(n => (
                <button key={n} className={tweaks.paydayDays===n?'active':''} onClick={() => setTweak('paydayDays', n)}>{n}d</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
